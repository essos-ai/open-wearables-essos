apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: open-wearables
spec:
  # Keep at 1 replica — app.sh runs alembic migrations on startup.
  # Scale up only after the first pod is healthy.
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/open-wearables/backend:${DEPLOY_TAG}
          imagePullPolicy: Always
          command: ["scripts/start/app.sh"]
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: open-wearables
          resources:
            requests:
              cpu: 256m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 3
